server {
    server_name acgnmuseum.com www.acgnmuseum.com;

    root /var/www/acgnmuseum.com;
    index index.html;

    sendfile on;
    tcp_nopush on;
    etag on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    open_file_cache max=1000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location ^~ /covers/thumbs/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, stale-while-revalidate=86400" always;
    }

    location ^~ /covers/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, stale-while-revalidate=86400" always;
    }

    location ^~ /fonts/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public" always;
    }

    location = /manifest.webmanifest {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public" always;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    location = /icon.svg {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public" always;
    }

    listen [::]:443 ssl http2; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/acgnmuseum.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/acgnmuseum.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.acgnmuseum.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = acgnmuseum.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name acgnmuseum.com www.acgnmuseum.com;
    return 404; # managed by Certbot
}
