# Include this file inside the existing HTTPS `server { ... }` block.
# It intentionally contains no certificate, domain, root, or proxy settings.

sendfile on;
tcp_nopush on;
etag on;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/manifest+json
  image/svg+xml;

open_file_cache max=1000 inactive=60s;
open_file_cache_valid 120s;
open_file_cache_min_uses 2;
open_file_cache_errors on;

location = /index.html {
  try_files $uri =404;
  add_header Cache-Control "no-cache" always;
}

location = /sw.js {
  try_files $uri =404;
  add_header Cache-Control "no-cache" always;
}

location = /manifest.webmanifest {
  try_files $uri =404;
  add_header Cache-Control "public, max-age=3600" always;
}

# Vite filenames in /assets/ contain a content hash, so they are safe to cache forever.
location ^~ /assets/ {
  try_files $uri =404;
  add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# Thumbnail filenames are stable rather than content-hashed. Cache for one week,
# then revalidate so regenerated thumbnails can still replace older versions.
location ^~ /covers/thumbs/ {
  try_files $uri =404;
  add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
}

location ^~ /covers/ {
  try_files $uri =404;
  add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
}

location ^~ /fonts/ {
  try_files $uri =404;
  add_header Cache-Control "public, max-age=2592000" always;
}

location = /icon.svg {
  try_files $uri =404;
  add_header Cache-Control "public, max-age=604800" always;
}
