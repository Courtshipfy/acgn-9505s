name: Test, build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production site
        run: npm run build

      - name: Configure deployment SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' '101.33.74.139 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA1q2AOZ9sRyjh/Biyzgb/YR5BlOyIvy3JKJl5nggiJn' > ~/.ssh/known_hosts

      - name: Deploy to production
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete --chmod=D2755,F0644 \
            -e "ssh -p $VPS_PORT -o IdentitiesOnly=yes" \
            dist/ "$VPS_USER@$VPS_HOST:/var/www/9505.courtship.top/"

      - name: Remove deployment key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
