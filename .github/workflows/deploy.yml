name: Test, build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production site
        run: npm run build

      - name: Configure deployment SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' '101.33.74.139 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIA1q2AOZ9sRyjh/Biyzgb/YR5BlOyIvy3JKJl5nggiJn' > ~/.ssh/known_hosts

      - name: Package production site
        run: tar -C dist -czf site.tar.gz .

      - name: Upload production package
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -P "$VPS_PORT" -o IdentitiesOnly=yes \
            site.tar.gz "$VPS_USER@$VPS_HOST:/home/deploy9505/site.tar.gz"

      - name: Activate production release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -p "$VPS_PORT" -o IdentitiesOnly=yes "$VPS_USER@$VPS_HOST" '
            set -eu
            target=/var/www/9505.courtship.top
            archive=/home/deploy9505/site.tar.gz
            test "$target" = /var/www/9505.courtship.top
            test -d "$target"
            test -f "$archive"
            find "$target" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
            tar -xzf "$archive" -C "$target"
            find "$target" -type d -exec chmod 2755 {} +
            find "$target" -type f -exec chmod 0644 {} +
            rm -f "$archive"
          '

      - name: Remove deployment key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
